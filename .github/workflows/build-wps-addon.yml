# 产物为平台无关的静态资源 + 离线 7z；无需按 OS 矩阵重复构建。
name: Build WPS add-in

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build:wps
      - uses: actions/upload-artifact@v4
        with:
          name: wps-addon-察元AI文档助手
          path: |
            wps-addon-build/
            release/
